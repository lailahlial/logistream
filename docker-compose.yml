services:
  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: logistream_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: logistream_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logistream_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: logistream
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  postgres:
    image: postgres:15-alpine
    container_name: logistream_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: logistream
      POSTGRES_USER: logistream
      POSTGRES_PASSWORD: logistream_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistream"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # SERVICES MÉTIER
  # ─────────────────────────────────────────────
  ingestion-kaggle:
    build: ./services/ingestion_kaggle
    container_name: logistream_ingestion_kaggle
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://logistream:logistream_secret@postgres:5432/logistream
    volumes:
      - ./data:/app/data

  replay-lade:
    build: ./services/replay_lade
    container_name: logistream_replay_lade
    depends_on:
      kafka:
        condition: service_healthy
      ingestion-kaggle:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TIME_ACCELERATION: "360"   # 1h data = 10s real
    volumes:
      - ./data:/app/data

  enrichissement:
    build: ./services/enrichissement
    container_name: logistream_enrichissement
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://logistream:logistream_secret@postgres:5432/logistream
      DELAY_THRESHOLD_MINUTES: "15"
    restart: on-failure

  agent-ia:
    build: ./services/agent_ia
    container_name: logistream_agent_ia
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://logistream:logistream_secret@postgres:5432/logistream
      ML_MODEL_PATH: /app/ml/delay_model.pkl
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3:4b
      LLM_PROVIDER: ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ml:/app/ml

  ui:
    build: ./services/ui
    container_name: logistream_ui
    depends_on:
      - agent-ia
      - postgres
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://logistream:logistream_secret@postgres:5432/logistream
      AGENT_API_URL: http://agent-ia:8000
    restart: on-failure

volumes:
  postgres_data:
